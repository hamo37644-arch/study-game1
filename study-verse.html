<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Study Quest · Cloud Sync</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpPjJZ9gQ0snyQbg2jxnYtxOAq3EDTl5g",
            authDomain: "study-verse-d6eed.firebaseapp.com",
            projectId: "study-verse-d6eed",
            storageBucket: "study-verse-d6eed.firebasestorage.app",
            messagingSenderId: "39752148969",
            appId: "1:39752148969:web:6959d961b1b479e60d0d78"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentXP = 0, currentLevel = 1, totalXP = 0, prestige = 0, streak = 0, lastClaimDate = null;
        let currentUser = null;
        let unsubscribeListener = null;

        function getToday() {
            const d = new Date();
            return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
        }

        function xpNeeded(lvl) { return lvl * 100; }
        function getBaseXP() { return 10 + (prestige * 4); }
        function getMultiplier() { return Math.min(2.0, 1.0 + Math.min(1.0, streak * 0.03)); }

        async function saveToCloud() {
            if (!currentUser) return;
            await setDoc(doc(db, "gameSaves", currentUser.uid), {
                currentXP, currentLevel, totalXP, prestige, streak, lastClaimDate,
                lastUpdated: new Date().toISOString()
            });
            showMessage("☁️ Saved to cloud!");
        }

        async function loadFromCloud() {
            if (!currentUser) return;
            const docSnap = await getDoc(doc(db, "gameSaves", currentUser.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                currentXP = data.currentXP ?? 0;
                currentLevel = data.currentLevel ?? 1;
                totalXP = data.totalXP ?? 0;
                prestige = data.prestige ?? 0;
                streak = data.streak ?? 0;
                lastClaimDate = data.lastClaimDate ?? null;
                updateUI();
                showMessage("☁️ Progress loaded!");
            }
        }

        function setupRealtimeSync() {
            if (unsubscribeListener) unsubscribeListener();
            if (!currentUser) return;
            unsubscribeListener = onSnapshot(doc(db, "gameSaves", currentUser.uid), (docSnap) => {
                if (docSnap.exists() && !window._isLocalUpdate) {
                    const data = docSnap.data();
                    currentXP = data.currentXP ?? 0;
                    currentLevel = data.currentLevel ?? 1;
                    totalXP = data.totalXP ?? 0;
                    prestige = data.prestige ?? 0;
                    streak = data.streak ?? 0;
                    lastClaimDate = data.lastClaimDate ?? null;
                    updateUI();
                    showMessage("🔄 Synced from another device!");
                }
                window._isLocalUpdate = false;
            });
        }

        function updateUI() {
            const need = xpNeeded(currentLevel);
            document.getElementById('xpValue').innerText = currentXP;
            document.getElementById('xpNeeded').innerText = need;
            document.getElementById('totalXpSpan').innerText = totalXP;
            document.getElementById('streakCount').innerText = streak;
            document.getElementById('levelNumber').innerText = currentLevel;
            document.getElementById('prestigeLevel').innerText = prestige;
            document.getElementById('streakBonusPercent').innerText = Math.floor((getMultiplier()-1)*100);
            document.getElementById('levelProgressText').innerText = `${currentXP}/${need}`;
            document.getElementById('levelProgressFill').style.width = `${(currentXP/need)*100}%`;
        }

        function addXP(amount) {
            totalXP += amount;
            currentXP += amount;
            let need = xpNeeded(currentLevel);
            while (currentXP >= need && currentLevel < 999) {
                currentXP -= need;
                currentLevel++;
                need = xpNeeded(currentLevel);
                showMessage(`🎉 LEVEL ${currentLevel}! 🎉`);
            }
            updateUI();
            if (currentUser) {
                window._isLocalUpdate = true;
                saveToCloud();
            }
        }

        window.study = function() {
            let reward = Math.floor(getBaseXP() * getMultiplier());
            addXP(reward);
            showMessage(`📖 +${reward} XP!`);
        };

        window.dailyLogin = function() {
            const today = getToday();
            if (lastClaimDate === today) {
                showMessage("🌞 Already claimed today!");
                return;
            }
            let newStreak = 1;
            if (lastClaimDate) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yStr = `${yesterday.getFullYear()}-${(yesterday.getMonth()+1).toString().padStart(2,'0')}-${yesterday.getDate().toString().padStart(2,'0')}`;
                if (lastClaimDate === yStr) newStreak = streak + 1;
            }
            streak = newStreak;
            lastClaimDate = today;
            updateUI();
            if (currentUser) {
                window._isLocalUpdate = true;
                saveToCloud();
            }
            showMessage(`✅ ${streak} day streak!`);
        };

        window.prestigeFunc = function() {
            if (currentLevel < 3 && prestige === 0) {
                showMessage("❄️ Need level 3 first!");
                return;
            }
            prestige++;
            currentLevel = 1;
            currentXP = 0;
            updateUI();
            if (currentUser) {
                window._isLocalUpdate = true;
                saveToCloud();
            }
            showMessage(`✨ PRESTIGE ${prestige}! ✨`);
        };

        window.hardReset = function() {
            if (confirm("Delete ALL progress?")) {
                currentXP = 0; currentLevel = 1; totalXP = 0; prestige = 0; streak = 0; lastClaimDate = null;
                updateUI();
                if (currentUser) saveToCloud();
                showMessage("💀 Reset complete!");
            }
        };

        window.login = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMessage("✅ Logged in!");
            } catch(e) {
                showMessage("❌ " + e.message);
            }
        };

        window.signup = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (password.length < 6) {
                showMessage("Password needs 6+ characters");
                return;
            }
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                showMessage("✅ Account created!");
            } catch(e) {
                showMessage("❌ " + e.message);
            }
        };

        window.logout = async function() {
            await signOut(auth);
            showMessage("👋 Logged out");
        };

        function updateAuthUI(user) {
            if (user) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('loggedInSection').style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('gameplaySection').style.display = 'block';
                currentUser = user;
                loadFromCloud();
                setupRealtimeSync();
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('loggedInSection').style.display = 'none';
                document.getElementById('gameplaySection').style.display = 'none';
                currentUser = null;
                if (unsubscribeListener) unsubscribeListener();
            }
        }

        onAuthStateChanged(auth, updateAuthUI);

        let msgTimeout;
        function showMessage(msg) {
            const el = document.getElementById('gameMessage');
            if (msgTimeout) clearTimeout(msgTimeout);
            el.innerHTML = `✨ ${msg} ✨`;
            msgTimeout = setTimeout(() => {
                el.innerHTML = '☁️ Cloud active! Login to save across devices.';
            }, 2000);
        }

        updateUI();
    </script>

    <style>
        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            max-width: 600px;
            width: 100%;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(168, 85, 247, 0.1);
        }
        
        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        
        .stat {
            background: linear-gradient(135deg, #0f172a, #020617);
            padding: 8px 18px;
            border-radius: 28px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }
        
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            font-weight: 600;
        }
        
        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }
        
        .stat-sub {
            font-size: 0.8rem;
            color: #64748b;
        }
        
        /* Prestige Area */
        .prestige-area {
            display: flex;
            justify-content: space-between;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        
        .level-badge {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-flex;
            align-items: baseline;
            gap: 10px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }
        
        .prestige-badge {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.3);
        }
        
        .level-badge span, .prestige-badge span {
            font-size: 1.3rem;
            font-weight: 800;
        }
        
        /* Progress Bar */
        .progress-section {
            margin: 20px 0;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }
        
        .progress-bar-bg {
            background: #0f172a;
            border-radius: 20px;
            height: 24px;
            overflow: hidden;
            border: 1px solid #334155;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #f59e0b, #fbbf24, #fcd34d);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
        
        /* Main Study Button */
        .action-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            width: 100%;
            padding: 22px 0;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: inherit;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            box-shadow: 0 8px 20px -5px rgba(16, 185, 129, 0.4);
        }
        
        .action-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 10px -3px rgba(16, 185, 129, 0.4);
        }
        
        /* Streak Card */
        .streak-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #f59e0b;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.1);
        }
        
        .streak-flame {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 1.1rem;
            color: #fbbf24;
            font-weight: bold;
        }
        
        /* Buttons Group */
        .button-group {
            display: flex;
            gap: 12px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        
        .sec-btn {
            background: linear-gradient(135deg, #334155, #1e293b);
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: #e2e8f0;
            cursor: pointer;
            flex: 1;
            transition: all 0.1s;
            font-size: 0.85rem;
            font-family: inherit;
            border: 1px solid #475569;
        }
        
        .sec-btn:active {
            transform: scale(0.97);
            background: linear-gradient(135deg, #475569, #334155);
        }
        
        .prestige-btn {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border-color: #a78bfa;
        }
        
        .reset-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-color: #f87171;
        }
        
        /* Message Area */
        .message-area {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 24px;
            padding: 14px;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 20px;
            color: #cbd5e1;
            border: 1px solid #334155;
        }
        
        /* Auth Box */
        .auth-box {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #334155;
        }
        
        .auth-box h3 {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 32px;
            color: #f1f5f9;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .auth-input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
        
        .auth-input::placeholder {
            color: #64748b;
        }
        
        /* Logged In Info */
        .loggedin-info {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #10b981;
        }
        
        .loggedin-info span {
            color: #10b981;
            font-weight: 500;
        }
        
        hr {
            border-color: #334155;
            margin: 16px 0;
        }
        
        /* Small text */
        .small-text {
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
            margin-top: 12px;
        }
        
        @media (max-width: 500px) {
            .game-container {
                padding: 16px;
            }
            .stat-value {
                font-size: 1.2rem;
            }
            .action-btn {
                font-size: 1.5rem;
                padding: 16px;
            }
            .sec-btn {
                font-size: 0.75rem;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div id="authSection" class="auth-box">
        <h3>☁️ Cloud Sync</h3>
        <input type="email" id="loginEmail" class="auth-input" placeholder="Email">
        <input type="password" id="loginPassword" class="auth-input" placeholder="Password">
        <div class="button-group" style="margin-top: 16px;">
            <button class="sec-btn" onclick="login()" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">🔐 LOGIN</button>
            <button class="sec-btn" onclick="signup()" style="background: linear-gradient(135deg, #10b981, #059669);">📝 SIGN UP</button>
        </div>
        <div class="small-text">Login once → play on any device!</div>
    </div>

    <div id="loggedInSection" style="display:none;">
        <div class="loggedin-info">
            <span>📧 <span id="userEmail"></span></span>
            <button class="sec-btn" onclick="logout()" style="background: linear-gradient(135deg, #ef4444, #dc2626); padding: 6px 16px;">🚪 LOGOUT</button>
        </div>
    </div>

    <div id="gameplaySection" style="display:none;">
        <div class="stats-row">
            <div class="stat"><span class="stat-label">📚 XP</span><span class="stat-value" id="xpValue">0</span><span class="stat-sub">/<span id="xpNeeded">100</span></span></div>
            <div class="stat"><span class="stat-label">✨ TOTAL</span><span class="stat-value" id="totalXpSpan">0</span></div>
            <div class="stat"><span class="stat-label">⚡ STREAK</span><span class="stat-value" id="streakCount">0</span><span class="stat-sub">🔥</span></div>
        </div>

        <div class="prestige-area">
            <div class="level-badge">🎯 LEVEL <span id="levelNumber">1</span></div>
            <div class="prestige-badge">🏆 PRESTIGE <span id="prestigeLevel">0</span></div>
        </div>

        <div class="progress-section">
            <div class="progress-label"><span>🔰 Level Progress</span><span id="levelProgressText">0/100</span></div>
            <div class="progress-bar-bg"><div class="progress-fill" id="levelProgressFill"></div></div>
        </div>

        <div class="streak-card">
            <div class="streak-flame">🔥 <strong id="streakBonusPercent">0%</strong> bonus XP</div>
            <div style="font-size:0.8rem; color:#94a3b8;">📅 daily login = streak</div>
        </div>

        <button class="action-btn" onclick="study()">📖 STUDY NOW ✨</button>

        <div class="button-group">
            <button class="sec-btn" onclick="dailyLogin()">🌙 DAILY LOGIN</button>
            <button class="sec-btn prestige-btn" onclick="prestigeFunc()">🌟 PRESTIGE</button>
            <button class="sec-btn reset-btn" onclick="hardReset()">⚠️ RESET</button>
        </div>
    </div>

    <div class="message-area" id="gameMessage">
        ☁️ Create account → login → play on any device!
    </div>
</div>
</body>
</html>
